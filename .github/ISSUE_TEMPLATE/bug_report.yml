name: Bug report
description: Report a problem with PDFEdit
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much detail as you can. The more we have, the faster we can fix it.
  - type: input
    id: version
    attributes:
      label: PDFEdit version
      description: Either a release tag (e.g. `v0.1.0`) or `built from main on YYYY-MM-DD`.
      placeholder: "v0.1.0  —  or  built from main on 2026-05-01"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system and version
      placeholder: "macOS 14.4 / Ubuntu 24.04 / Windows 11 23H2"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: A minimal sequence of actions that triggers the bug.
      placeholder: |
        1. Open PDFEdit
        2. Open a PDF via File -> Open
        3. Click the Text tool
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: pdf
    attributes:
      label: Offending PDF (if shareable)
      description: Attach the PDF that triggers the bug, if you are able to share it. Drag-and-drop works in this field.
  - type: textarea
    id: traceback
    attributes:
      label: Traceback / terminal output
      description: If you launched PDFEdit from a terminal, paste any traceback or error messages here.
      render: shell
  - type: textarea
    id: notes
    attributes:
      label: Additional context
