name: Feature request
description: Suggest an idea or improvement for PDFEdit
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem first, then the solution. We are more likely to act on a clear problem statement than on a fully-specified solution to an unclear problem.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What are you trying to do, and what is in the way? "I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like PDFEdit to solve this?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have thought about, and why you discarded them.
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Mockups, links, related issues, etc.
