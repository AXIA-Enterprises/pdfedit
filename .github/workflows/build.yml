name: Build PDFEdit (mac/linux/windows)

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: System deps for headless Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 libdbus-1-3
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-qt
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -v

  build:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    env:
      PDFEDIT_BUNDLE_ID: io.github.axia-enterprises.pdfedit
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: PDFEdit-macos.zip
          - os: ubuntu-latest
            artifact_name: PDFEdit-linux.zip
          - os: windows-latest
            artifact_name: PDFEdit-windows.zip
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          BUNDLE_ID="${PDFEDIT_BUNDLE_ID:-io.github.axia-enterprises.pdfedit}"
          python make_icon.py
          python -m PyInstaller --windowed --noconfirm \
            --name PDFEdit \
            --osx-bundle-identifier "$BUNDLE_ID" \
            --icon PDFEdit.icns \
            pdfedit.py
          PB=/usr/libexec/PlistBuddy
          PL=dist/PDFEdit.app/Contents/Info.plist
          $PB -c "Add :CFBundleDocumentTypes array" "$PL" || true
          $PB -c "Add :CFBundleDocumentTypes:0 dict" "$PL"
          $PB -c "Add :CFBundleDocumentTypes:0:CFBundleTypeName string PDF Document" "$PL"
          $PB -c "Add :CFBundleDocumentTypes:0:CFBundleTypeRole string Editor" "$PL"
          $PB -c "Add :CFBundleDocumentTypes:0:LSHandlerRank string Alternate" "$PL"
          $PB -c "Add :CFBundleDocumentTypes:0:LSItemContentTypes array" "$PL"
          $PB -c "Add :CFBundleDocumentTypes:0:LSItemContentTypes:0 string com.adobe.pdf" "$PL"
          cd dist && zip -qry ../PDFEdit-macos.zip PDFEdit.app

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 libdbus-1-3
          python -m PyInstaller --windowed --noconfirm --name PDFEdit pdfedit.py
          cd dist && zip -qry ../PDFEdit-linux.zip PDFEdit

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m PyInstaller --windowed --noconfirm --name PDFEdit pdfedit.py
          Compress-Archive -Path dist/PDFEdit -DestinationPath PDFEdit-windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
